name: Deploy Baragão Site

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Transfer Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "baragao-site/*.html,baragao-site/css/*,baragao-site/js/*"
          target: "/var/www/grupobaragao.com.br"
          strip_components: 1

      - name: Apply Server Config & Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            chown -R www-data:www-data /var/www/grupobaragao.com.br
            chmod -R 755 /var/www/grupobaragao.com.br
            nginx -t && systemctl reload nginx
